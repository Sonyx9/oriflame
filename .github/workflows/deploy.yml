# Stejný princip jako GitHub starter „Deploy Astro site to Pages“:
# configure-pages nastaví správné --site a --base (project /oriflame vs vlastní doména v kořeni).
# Pages: Settings → Pages → Source = GitHub Actions; vlastní doména + DNS CNAME → USER.github.io
name: Deploy Oriflame to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build with Astro (site + base z GitHub Pages)
        run: |
          set -e
          SITE="${{ steps.pages.outputs.origin }}"
          BASE="${{ steps.pages.outputs.base_path }}"
          if [ -z "$BASE" ]; then BASE="/"; fi
          # Astro očekává base s koncovým / (jinak se rozbije slepování cest, např. /oriflamefavicon.svg)
          if [ "$BASE" != "/" ]; then
            case "$BASE" in */) ;; *) BASE="${BASE}/" ;; esac
          fi
          echo "astro build --site=$SITE --base=$BASE"
          npx astro build --site "$SITE" --base "$BASE"

      - name: Verify output
        run: |
          test -f dist/index.html
          ls -la dist

      - name: 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
