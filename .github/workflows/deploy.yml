# Vlastní doména servíruje statiku z kořene (/) — base musí být '/', ne /oriflame/.
# configure-pages často vrací base_path /oriflame i při custom domain → rozbité CSS na oriflame.freedomfashion.cz
# Pages: Settings → Source = GitHub Actions; DNS CNAME oriflame → Sonyx9.github.io
name: Deploy Oriflame to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -f dist/index.html
          grep -E 'href="/assets/|href="/favicon' dist/index.html | head -1 || true

      - name: 404 fallback
        run: cp dist/index.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
